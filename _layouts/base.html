<!doctype html>
<html lang="{{ site.locale | slice: 0,2 | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title | escape }} · {% endif %}{{ site.title | escape }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/images/favicon-32x32.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/images/apple-touch-icon-180x180.png' | relative_url }}">

  <!-- Fonts & icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/academicons@1.9.4/css/academicons.min.css">

  <link rel="stylesheet" href="{{ '/assets/css/yz-theme.css' | relative_url }}">
</head>
<body>

  <nav class="site-nav">
    {% for item in site.data.navigation.main %}
      <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} class="current"{% endif %}>{{ item.title | downcase }}</a>
    {% endfor %}
  </nav>

  {{ content }}

  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author.name | default: site.title }}.
    Built with <a href="https://jekyllrb.com/">Jekyll</a>, hosted on GitHub Pages.</p>
  </footer>

</body>
</html>
